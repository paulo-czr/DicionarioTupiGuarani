<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="inserir.css">
    <title>inserir</title>

</head>

<body>
    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="index.html">
                    <div class="brand-icon me-3">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-0.5-5.11" />
                            <path d="M4 19.5h16" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="h4 title-main">Dicionário <span class="title-sub">Tupi-Guarani</span></h1>
                        <div class="subtitle">Árvore Binária de Busca</div>
                    </div>
                </a>

                <!-- NAV LINKS PAGINAS -->
                <div class="ms-auto">
                    <ul class="nav nav-pills">
                        <li class="nav-item">
                            <a class="nav-link active" href="../index.html"><span>🏠</span> Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="inserir.html"><span>+</span> Inserir</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../pesquisar/pesquisar.html"><span>🔍</span> Pesquisar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../listar/listar.html"><span>≡</span> Listar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../travessias/travessias.html"><span>🔗</span> Travessias</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>



    <main class="container-fluid container py-5">

    <!-- Titulo Inserir palavra -->
    <div class="welcome-wrapper d-flex flex-column align-items-center text-center mb-5">
        <div class="d-flex align-items-center justify-content-center gap-3 mb-2">
            <div class="icon-inserir-container">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-0.5-5.11" />
                    <path d="M4 19.5h16" />
                </svg>
            </div>
            <h1 class="welcome-title text-green-inserir mb-0">Inserir Palavra</h1>
        </div>
        <p class="welcome-subtitle text-muted fs-6">
            Adicione novas palavras em Tupi-Guarani ao dicionário
        </p>
    </div>

    <!-- formulario de insercao-->
    <div class="d-flex justify-content-center">
        <div class="form-card">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="icon-inserir-container">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-0.5-5.11" />
                        <path d="M4 19.5h16" />
                    </svg>
                </div>
                <h2 class="form-title mb-0">Adicionar Nova Palavra</h2>
            </div>

            <!-- FORMULÁRIO DE INSERÇÃO e Consumo da api -->
            <form action="/api/palavras" method="POST">
                <div class="mb-4">
                    <label for="tupi" class="form-label">Palavra em Tupi-Guarani</label>
                    <input type="text" class="form-control custom-input" id="tupi" name="tupi" placeholder="Ex: Ybá" required>
                </div>

                <div class="mb-4">
                    <label for="portugues" class="form-label">Tradução em Português</label>
                    <input type="text" class="form-control custom-input" id="portugues" name="portugues" placeholder="Ex: Fruta" required>
                </div>

                <button type="submit" class="btn btn-inserir-submit w-100">
                    <span>+</span> Inserir Palavra
                </button>
            </form>
        </div>
    </div>

</main>

</body>

</html>
